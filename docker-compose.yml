version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  traefik:
    image: traefik:v3.0
    command:
      - --entryPoints.web.address=:80
      - --api.insecure=false
      - --api.dashboard=true
      - --providers.docker=true
      - --log.level=INFO
      - --serverstransport.insecureSkipVerify=true
    ports:
      - "80:80"
      - "8080:8080"
    environment:
      - TRAEFIK_DASHBOARD_AUTH=${TRAEFIK_DASHBOARD_AUTH}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  ms-auth:
    build: ./ms-auth
    depends_on:
      - postgres
      - redis
    environment:
      - PORT=${MS_AUTH_PORT}
      - POSTGRES_DSN=${POSTGRES_DSN}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ENVIRONMENT=${ENVIRONMENT}
    labels:
      - "traefik.http.routers.ms-auth.rule=PathPrefix(`/api/auth`)"
      - "traefik.http.services.ms-auth.loadbalancer.server.port=8080"

  ms-usuarios:
    build: ./ms-usuarios
    depends_on:
      - postgres
    environment:
      - PORT=${MS_USUARIOS_PORT}
    labels:
      - "traefik.http.routers.ms-usuarios.rule=PathPrefix(`/api/usuarios`)"
      - "traefik.http.services.ms-usuarios.loadbalancer.server.port=8081"

  ms-tramites:
    build: ./ms-tramites
    depends_on:
      - postgres
    environment:
      - PORT=${MS_TRAMITES_PORT}
    labels:
      - "traefik.http.routers.ms-tramites.rule=PathPrefix(`/api/tramites`)"
      - "traefik.http.services.ms-tramites.loadbalancer.server.port=8082"

  ms-integraciones:
    build: ./ms-integraciones
    depends_on:
      - postgres
    environment:
      - PORT=${MS_INTEGRACIONES_PORT}
    labels:
      - "traefik.http.routers.ms-integraciones.rule=PathPrefix(`/api/integraciones`)"
      - "traefik.http.services.ms-integraciones.loadbalancer.server.port=8083"

  ms-reportes:
    build: ./ms-reportes
    depends_on:
      - postgres
    environment:
      - PORT=${MS_REPORTES_PORT}
    labels:
      - "traefik.http.routers.ms-reportes.rule=PathPrefix(`/api/reportes`)"
      - "traefik.http.services.ms-reportes.loadbalancer.server.port=8084"

  ms-auditoria:
    build: ./ms-auditoria
    depends_on:
      - postgres
    environment:
      - PORT=${MS_AUDITORIA_PORT}
    labels:
      - "traefik.http.routers.ms-auditoria.rule=PathPrefix(`/api/auditoria`)"
      - "traefik.http.services.ms-auditoria.loadbalancer.server.port=8085"

volumes:
  db-data:
